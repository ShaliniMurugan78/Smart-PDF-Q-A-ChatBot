services:
  - type: web
    name: smart-pdf-qa-chatbot
    runtime: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: PORT
        value: 10000

      # Add your keys here
      - key: GROQ_API_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false
